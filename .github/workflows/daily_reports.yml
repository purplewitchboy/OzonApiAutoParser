name: Daily Ozon Reports

on:
  schedule:
    - cron: '0 3 * * *'  # 6:00 МСК = 03:00 UTC
  workflow_dispatch:       # ручной запуск через интерфейс GitHub

jobs:
  run-reports:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run all reports for all spreadsheets
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          SPREADSHEETS_JSON: ${{ secrets.SPREADSHEETS_JSON }}
        run: |
          python - <<'EOF'
          import json, subprocess, sys, os

          spreadsheets = json.loads(os.environ["SPREADSHEETS_JSON"])

          commands = [
              "products", "prices", "ads", "details",
              "sales-fbo", "orders-fbo", "stock-fbo",
              "orders-fbs", "stock-fbs"
          ]

          errors = []
          for sheet in spreadsheets:
              print(f"\n{'='*60}")
              print(f"Таблица: {sheet['name']}")
              print(f"{'='*60}")
              for cmd in commands:
                  print(f"\n--- {cmd} ---")
                  result = subprocess.run(
                      [sys.executable, "run.py", cmd, sheet["id"]],
                      capture_output=False
                  )
                  if result.returncode != 0:
                      errors.append(f"{sheet['name']} / {cmd}")

          if errors:
              print(f"\nОШИБКИ в следующих выгрузках:")
              for e in errors:
                  print(f"  - {e}")
              sys.exit(1)
          else:
              print("\nВсе выгрузки завершены успешно.")
          EOF
